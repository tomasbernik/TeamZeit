openapi: 3.1.0
info:
  title: TeamZeit API
  version: 0.2.0
  description: Tenant-safe direct work-interval time tracking.
servers: [{ url: /api/v1 }]
security: [{ bearerAuth: [] }]
paths:
  /attendance/today:
    get:
      operationId: getTodayAttendance
      tags: [TimeTracking]
      parameters: [{ $ref: '#/components/parameters/OrganizationId' }]
      responses: { '200': { description: Current day including intervals and derived totals, content: { application/json: { schema: { $ref: '#/components/schemas/TodayAttendance' } } } }, '403': { $ref: '#/components/responses/Forbidden' } }
  /attendance/days/{workDate}:
    get:
      operationId: getDailyAttendance
      tags: [TimeTracking]
      parameters: [{ $ref: '#/components/parameters/OrganizationId' }, { name: workDate, in: path, required: true, schema: { type: string, format: date } }]
      responses: { '200': { description: Daily interval overview, content: { application/json: { schema: { $ref: '#/components/schemas/DailyAttendance' } } } } }
  /attendance/months/{month}:
    get:
      operationId: getMonthlyAttendance
      tags: [TimeTracking]
      parameters: [{ $ref: '#/components/parameters/OrganizationId' }, { name: month, in: path, required: true, schema: { type: string, pattern: '^\d{4}-\d{2}$' } }]
      responses: { '200': { description: Monthly totals, content: { application/json: { schema: { $ref: '#/components/schemas/MonthlyAttendance' } } } } }
  /attendance/commands/clock-in:
    post:
      operationId: clockIn
      tags: [TimeTracking]
      parameters: [{ $ref: '#/components/parameters/OrganizationId' }, { $ref: '#/components/parameters/IdempotencyKey' }]
      responses: { '200': { $ref: '#/components/responses/ClockCommand' }, '409': { $ref: '#/components/responses/Conflict' } }
  /attendance/commands/clock-out:
    post:
      operationId: clockOut
      tags: [TimeTracking]
      parameters: [{ $ref: '#/components/parameters/OrganizationId' }, { $ref: '#/components/parameters/IdempotencyKey' }]
      responses: { '200': { $ref: '#/components/responses/ClockCommand' }, '409': { $ref: '#/components/responses/Conflict' } }
  /attendance/commands/break-start:
    post:
      deprecated: true
      operationId: deprecatedBreakStartAsClockOut
      tags: [TimeTracking]
      parameters: [{ $ref: '#/components/parameters/OrganizationId' }, { $ref: '#/components/parameters/IdempotencyKey' }]
      responses: { '200': { $ref: '#/components/responses/ClockCommand' } }
  /attendance/commands/break-end:
    post:
      deprecated: true
      operationId: deprecatedBreakEndAsClockIn
      tags: [TimeTracking]
      parameters: [{ $ref: '#/components/parameters/OrganizationId' }, { $ref: '#/components/parameters/IdempotencyKey' }]
      responses: { '200': { $ref: '#/components/responses/ClockCommand' } }
  /attendance/sessions:
    get:
      operationId: listOwnIntervals
      tags: [TimeTracking]
      parameters: [{ $ref: '#/components/parameters/OrganizationId' }, { name: from, in: query, required: true, schema: { type: string, format: date } }, { name: to, in: query, required: true, schema: { type: string, format: date } }]
      responses: { '200': { description: Own intervals } }
    post:
      operationId: createOwnInterval
      tags: [TimeTracking]
      parameters: [{ $ref: '#/components/parameters/OrganizationId' }, { $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CreateInterval' } } } }
      responses: { '201': { description: Interval created immediately, content: { application/json: { schema: { $ref: '#/components/schemas/WorkSession' } } } }, '409': { $ref: '#/components/responses/Conflict' } }
  /attendance/sessions/{sessionId}:
    put:
      operationId: updateOwnInterval
      tags: [TimeTracking]
      parameters: [{ $ref: '#/components/parameters/OrganizationId' }, { $ref: '#/components/parameters/IdempotencyKey' }, { $ref: '#/components/parameters/SessionId' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/UpdateInterval' } } } }
      responses: { '200': { description: Interval updated immediately }, '409': { $ref: '#/components/responses/Conflict' } }
    delete:
      operationId: archiveOwnInterval
      tags: [TimeTracking]
      parameters: [{ $ref: '#/components/parameters/OrganizationId' }, { $ref: '#/components/parameters/IdempotencyKey' }, { $ref: '#/components/parameters/SessionId' }, { name: expectedVersion, in: query, required: true, schema: { type: integer, minimum: 1 } }]
      responses: { '200': { description: Interval archived immediately }, '409': { $ref: '#/components/responses/Conflict' } }
components:
  securitySchemes: { bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT } }
  parameters:
    OrganizationId: { name: X-Organization-Id, in: header, required: true, schema: { type: string, format: uuid }, description: Tenant selector verified against the authenticated membership. }
    IdempotencyKey: { name: Idempotency-Key, in: header, required: true, schema: { type: string, format: uuid } }
    SessionId: { name: sessionId, in: path, required: true, schema: { type: string, format: uuid } }
  responses:
    ClockCommand: { description: Server-time clock result, content: { application/json: { schema: { type: object, required: [serverTime, session], properties: { serverTime: { type: string, format: date-time }, session: { $ref: '#/components/schemas/WorkSession' } } } } } }
    Forbidden: { description: Active tenant membership or ownership missing }
    Conflict: { description: Invalid state, stale version, overlap, duplicate action, or closed period }
  schemas:
    WorkSession:
      type: object
      required: [id, organizationId, membershipId, workDate, startedAt, state, source, version]
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        membershipId: { type: string, format: uuid }
        workDate: { type: string, format: date }
        startedAt: { type: string, format: date-time }
        endedAt: { type: string, format: date-time }
        workedMinutes: { type: integer, minimum: 0 }
        state: { type: string, enum: [not_started, working] }
        source: { type: string, enum: [clock, manual, admin_import] }
        version: { type: integer, minimum: 1 }
    CreateInterval:
      type: object
      additionalProperties: false
      required: [workDate, startedAt, endedAt]
      properties: { workDate: { type: string, format: date }, startedAt: { type: string, format: date-time }, endedAt: { type: string, format: date-time } }
    UpdateInterval:
      allOf: [{ $ref: '#/components/schemas/CreateInterval' }, { type: object, required: [expectedVersion], properties: { expectedVersion: { type: integer, minimum: 1 } } }]
    DailyAttendance:
      type: object
      required: [workDate, state, sessions, workedMinutes, breakMinutes]
      properties: { workDate: { type: string, format: date }, state: { type: string, enum: [not_started, working] }, sessions: { type: array, items: { $ref: '#/components/schemas/WorkSession' } }, workedMinutes: { type: integer }, breakMinutes: { type: integer } }
    TodayAttendance:
      allOf: [{ $ref: '#/components/schemas/DailyAttendance' }, { type: object, required: [serverTime], properties: { serverTime: { type: string, format: date-time }, activeSession: { $ref: '#/components/schemas/WorkSession' } } }]
    MonthlyAttendance:
      type: object
      required: [month, days, workedMinutes, breakMinutes]
      properties: { month: { type: string }, days: { type: array, items: { $ref: '#/components/schemas/DailyAttendance' } }, workedMinutes: { type: integer }, breakMinutes: { type: integer } }
