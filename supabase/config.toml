project_id = "teamzeit-local"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[realtime]
enabled = false

[studio]
enabled = false
port = 54323
api_url = "http://127.0.0.1:54321"

[analytics]
enabled = false

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = false

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["http://127.0.0.1:5173"]
jwt_expiry = 3600
# GoTrue requires the signup endpoint for passwordless email login, even for
# existing users. The web client sets shouldCreateUser=false.
enable_signup = true


[auth.email]
# Keep the email provider available for existing seeded users.
enable_signup = true
enable_confirmations = false

[edge_runtime]
enabled = false
